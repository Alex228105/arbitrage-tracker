<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbitrage Tracker 🌸</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #fff0f5;
    --surface: rgba(255,255,255,0.85);
    --surface2: rgba(255,220,235,0.6);
    --surface3: rgba(255,200,220,0.5);
    --border: #f4a7c0;
    --text: #5a2d42;
    --muted: #c084a0;
    --p1-color: #e05c8a;
    --p2-color: #9b59b6;
    --accent: #e91e8c;
    --positive: #27ae60;
    --negative: #e74c3c;
    --warn: #f39c12;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: linear-gradient(160deg, #fff0f5 0%, #fce4ec 40%, #f8bbd0 100%);
    color: var(--text);
    font-family: 'Quicksand', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  canvas#stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

  .flower { position: fixed; pointer-events: none; z-index: 0; opacity: 0.18; animation: floatF 7s ease-in-out infinite; }
  .flower:nth-child(1) { top:8%; left:3%; font-size:32px; animation-delay:0s; }
  .flower:nth-child(2) { top:18%; right:5%; font-size:24px; animation-delay:1.2s; }
  .flower:nth-child(3) { top:45%; left:1%; font-size:20px; animation-delay:2.5s; }
  .flower:nth-child(4) { top:65%; right:3%; font-size:28px; animation-delay:0.8s; }
  .flower:nth-child(5) { top:82%; left:7%; font-size:22px; animation-delay:3s; }
  .flower:nth-child(6) { top:30%; right:12%; font-size:18px; animation-delay:4s; }
  .flower:nth-child(7) { top:55%; left:92%; font-size:26px; animation-delay:1.8s; }

  @keyframes floatF {
    0%,100% { transform: translateY(0) rotate(0deg); opacity:0.18; }
    50% { transform: translateY(-18px) rotate(12deg); opacity:0.28; }
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(12px);
    position: relative;
    z-index: 10;
    box-shadow: 0 2px 20px rgba(233,30,140,0.08);
  }

  .logo {
    font-family: 'Quicksand', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: 0.5px;
  }

  .logo-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
    box-shadow: 0 0 8px rgba(233,30,140,0.5);
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(233,30,140,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(233,30,140,0); }
  }

  .status-bar { display:flex; gap:16px; align-items:center; font-size:12px; font-weight:600; }
  .status-item { display:flex; align-items:center; gap:6px; color:var(--muted); }
  .status-dot { width:7px; height:7px; border-radius:50%; background:var(--muted); }
  .status-dot.online { background:#27ae60; animation:pulse2 2s infinite; }
  @keyframes pulse2 { 0%,100%{box-shadow:0 0 0 0 rgba(39,174,96,0.4);} 50%{box-shadow:0 0 0 6px rgba(39,174,96,0);} }

  .live-indicator { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--accent); font-weight:700; }
  .live-dot { width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 1.5s infinite; }

  .main {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: calc(100vh - 57px);
    position: relative;
    z-index: 1;
  }

  .sidebar {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,240,245,0.8);
  }

  .sidebar-title {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    font-weight: 600;
  }

  .btn-add {
    background: linear-gradient(135deg, #e91e8c, #f06292);
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    font-family: 'Quicksand', sans-serif;
    cursor: pointer;
    font-weight: 700;
    box-shadow: 0 3px 12px rgba(233,30,140,0.3);
    transition: all 0.2s;
  }
  .btn-add:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(233,30,140,0.4); }

  .pairs-list { flex:1; overflow-y:auto; padding:8px; }
  .pairs-list::-webkit-scrollbar { width:4px; }
  .pairs-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .pair-item {
    padding: 12px 14px;
    border-radius: 14px;
    cursor: pointer;
    border: 1px solid transparent;
    margin-bottom: 6px;
    position: relative;
    transition: all 0.2s;
    background: rgba(255,255,255,0.5);
  }
  .pair-item:hover { background: rgba(255,255,255,0.8); border-color: var(--border); }
  .pair-item.active { background: rgba(255,255,255,0.9); border-color: var(--accent); box-shadow: 0 3px 16px rgba(233,30,140,0.15); }

  .pair-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; display:flex; align-items:center; justify-content:space-between; color:var(--text); }
  .pair-labels { display:flex; gap:6px; font-size:11px; font-weight:600; }
  .label-p1 { color: var(--p1-color); }
  .label-p2 { color: var(--p2-color); }
  .pair-spread { margin-top:6px; font-size:12px; font-weight:700; }
  .spread-positive { color: var(--positive); }
  .spread-negative { color: var(--negative); }

  .btn-delete { position:absolute;top:8px;right:8px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;opacity:0;transition:opacity 0.2s;padding:2px 5px; }
  .pair-item:hover .btn-delete { opacity:1; }
  .btn-delete:hover { color:var(--negative); }

  .empty-pairs { padding:24px 16px;text-align:center;color:var(--muted);font-size:13px;line-height:1.8; }

  .chart-area {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: transparent;
  }

  .chart-header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
  }

  .chart-pair-name { font-size: 20px; font-weight: 700; color: var(--accent); }

  .price-display { display:flex; gap:24px; align-items:center; }
  .price-block { display:flex; flex-direction:column; gap:2px; }
  .price-label { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; font-weight:700; display:flex; align-items:center; gap:6px; color:var(--muted); }
  .price-label-dot { width:10px; height:3px; border-radius:2px; }
  .price-value { font-family:'Space Mono',monospace; font-size:18px; font-weight:700; letter-spacing:-0.5px; transition:color 0.3s; color:var(--text); }
  .price-value.flash-up { color:var(--positive); }
  .price-value.flash-down { color:var(--negative); }

  .spread-display {
    background: linear-gradient(135deg, rgba(233,30,140,0.08), rgba(240,98,146,0.08));
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 16px;
    text-align: center;
  }
  .spread-label { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); font-weight:600; }
  .spread-value { font-family:'Space Mono',monospace; font-size:20px; font-weight:700; margin-top:2px; }

  .timeframe-selector { display:flex; gap:3px; background:rgba(255,220,235,0.5); padding:4px; border-radius:12px; border:1px solid var(--border); }
  .tf-btn { background:none; border:none; color:var(--muted); font-size:12px; font-family:'Quicksand',sans-serif; font-weight:600; padding:4px 10px; border-radius:8px; cursor:pointer; transition:all 0.15s; }
  .tf-btn:hover { color:var(--text); background:rgba(255,255,255,0.6); }
  .tf-btn.active { background:linear-gradient(135deg,#e91e8c,#f06292); color:#fff; box-shadow:0 2px 8px rgba(233,30,140,0.3); }

  .chart-container { flex:1; padding:16px 20px; min-height:0; position:relative; background:rgba(255,255,255,0.4); }

  .no-pair-selected { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--muted); gap:12px; }
  .no-pair-icon { font-size:56px; animation:floatF 3s ease-in-out infinite; }

  /* Modal */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(200,100,150,0.25); z-index:1000; align-items:center; justify-content:center; backdrop-filter:blur(6px); }
  .modal-overlay.open { display:flex; }
  .modal { background:rgba(255,255,255,0.95); backdrop-filter:blur(20px); border:1px solid var(--border); border-radius:20px; padding:28px; width:400px; box-shadow:0 20px 60px rgba(233,30,140,0.2); }
  .modal-title { font-size:18px; font-weight:700; margin-bottom:20px; color:var(--accent); }

  .form-group { margin-bottom:16px; }
  .form-label { display:block; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); font-weight:700; margin-bottom:6px; }
  .form-input { width:100%; background:rgba(255,240,245,0.8); border:1.5px solid var(--border); border-radius:10px; color:var(--text); padding:10px 14px; font-size:14px; font-family:'Quicksand',sans-serif; font-weight:600; outline:none; transition:border-color 0.2s; }
  .form-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(233,30,140,0.1); }
  .form-hint { font-size:11px; color:var(--muted); margin-top:4px; }

  .modal-actions { display:flex; gap:10px; margin-top:20px; justify-content:flex-end; }
  .btn-cancel { background:none; border:1.5px solid var(--border); color:var(--muted); padding:9px 18px; border-radius:10px; cursor:pointer; font-size:14px; font-family:'Quicksand',sans-serif; font-weight:600; transition:all 0.15s; }
  .btn-cancel:hover { border-color:var(--text); color:var(--text); }
  .btn-confirm { background:linear-gradient(135deg,#e91e8c,#f06292); border:none; color:#fff; padding:9px 18px; border-radius:10px; cursor:pointer; font-size:14px; font-family:'Quicksand',sans-serif; font-weight:700; box-shadow:0 3px 12px rgba(233,30,140,0.3); transition:all 0.15s; }
  .btn-confirm:hover { transform:translateY(-1px); box-shadow:0 5px 16px rgba(233,30,140,0.4); }

  .alert-badge { display:none; position:fixed; top:70px; right:24px; background:linear-gradient(135deg,#e91e8c,#f06292); color:#fff; padding:10px 18px; border-radius:12px; font-weight:700; font-size:13px; z-index:500; box-shadow:0 4px 20px rgba(233,30,140,0.4); animation:slideIn 0.3s ease; }
  @keyframes slideIn { from{transform:translateX(100%);opacity:0;} to{transform:translateX(0);opacity:1;} }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="flower">🌸</div>
<div class="flower">🌺</div>
<div class="flower">🌼</div>
<div class="flower">🌷</div>
<div class="flower">🌸</div>
<div class="flower">💮</div>
<div class="flower">🌹</div>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    🌸 ARBITRAGE TRACKER
  </div>
  <div class="status-bar">
    <div class="status-item">
      <div class="status-dot" id="p1-status"></div>
      <span>BYBIT</span>
    </div>
    <div class="status-item">
      <div class="status-dot" id="p2-status"></div>
      <span>HYPERLIQUID</span>
    </div>
    <div class="live-indicator" id="live-indicator" style="display:none">
      <div class="live-dot"></div>
      LIVE
    </div>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Пары</span>
      <button class="btn-add" onclick="openModal()">+ Добавить</button>
    </div>
    <div class="pairs-list" id="pairs-list">
      <div class="empty-pairs" id="empty-msg">Нет пар 🌸<br>Нажми «+ Добавить»<br>чтобы начать</div>
    </div>
  </div>

  <div class="chart-area" id="chart-area">
    <div class="no-pair-selected" id="no-pair">
      <div class="no-pair-icon">🌸</div>
      <div style="font-weight:600;color:var(--muted)">Выбери пару слева</div>
    </div>

    <div id="chart-view" style="display:none;flex-direction:column;height:100%;">
      <div class="chart-header">
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
          <div class="chart-pair-name" id="chart-pair-name">—</div>
          <div class="price-display">
            <div class="price-block">
              <div class="price-label">
                <div class="price-label-dot" style="background:var(--p1-color)"></div>
                BYBIT
              </div>
              <div class="price-value" id="price-p1">—</div>
            </div>
            <div class="price-block">
              <div class="price-label">
                <div class="price-label-dot" style="background:var(--p2-color)"></div>
                HYPERLIQUID
              </div>
              <div class="price-value" id="price-p2">—</div>
            </div>
          </div>
          <div class="spread-display">
            <div class="spread-label">Спред</div>
            <div class="spread-value" id="spread-value">—</div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px;align-items:flex-end;">
          <div class="timeframe-selector">
            <button class="tf-btn active" onclick="setTimeframe('20s',this)">20s</button>
            <button class="tf-btn" onclick="setTimeframe('1m',this)">1m</button>
            <button class="tf-btn" onclick="setTimeframe('15m',this)">15m</button>
            <button class="tf-btn" onclick="setTimeframe('30m',this)">30m</button>
            <button class="tf-btn" onclick="setTimeframe('1h',this)">1h</button>
            <button class="tf-btn" onclick="setTimeframe('1d',this)">1d</button>
          </div>
          <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);font-weight:600;">
            <span>🔔 Алерт при спреде ≥</span>
            <input type="number" id="alert-threshold" placeholder="0.5" step="0.01"
              style="width:70px;background:rgba(255,240,245,0.8);border:1.5px solid var(--border);color:var(--text);padding:4px 8px;border-radius:8px;font-size:12px;outline:none;font-family:'Quicksand',sans-serif;font-weight:600;"
              onchange="saveAlert()">
            <span>%</span>
          </div>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="priceChart"></canvas>
      </div>
    </div>
  </div>
</div>

<div class="alert-badge" id="alert-badge">🌸 БОЛЬШОЙ СПРЕД!</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">🌸 Новая пара</div>
    <div class="form-group">
      <label class="form-label">Название пары</label>
      <input class="form-input" id="f-name" placeholder="BTC Arbitrage">
    </div>
    <div class="form-group">
      <label class="form-label">Символ на Bybit</label>
      <input class="form-input" id="f-p1" placeholder="BTCUSDT">
      <div class="form-hint">Например: BTCUSDT, ETHUSDT, SOLUSDT</div>
    </div>
    <div class="form-group">
      <label class="form-label">Символ на Hyperliquid</label>
      <input class="form-input" id="f-p2" placeholder="BTC">
      <div class="form-hint">Например: BTC, ETH, SOL</div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-confirm" onclick="addPair()">Добавить 🌸</button>
    </div>
  </div>
</div>

<script>
// ── Falling stars ─────────────────────────────────────────────────
const canvas = document.getElementById('stars');
const ctx2 = canvas.getContext('2d');
let stars = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function createStar() {
  return {
    x: Math.random() * canvas.width,
    y: -10,
    size: Math.random() * 3 + 1,
    speed: Math.random() * 1.5 + 0.5,
    opacity: Math.random() * 0.6 + 0.2,
    drift: (Math.random() - 0.5) * 0.5,
    char: Math.random() > 0.7 ? '✦' : '✶',
  };
}

for (let i = 0; i < 40; i++) {
  const s = createStar();
  s.y = Math.random() * canvas.height;
  stars.push(s);
}

function animateStars() {
  ctx2.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach((s, i) => {
    ctx2.globalAlpha = s.opacity;
    ctx2.fillStyle = '#e91e8c';
    ctx2.font = `${s.size * 6}px serif`;
    ctx2.fillText(s.char, s.x, s.y);
    s.y += s.speed;
    s.x += s.drift;
    if (s.y > canvas.height + 20) stars[i] = createStar();
  });
  ctx2.globalAlpha = 1;
  requestAnimationFrame(animateStars);
}
animateStars();

if (Math.random() < 0.3) stars.push(createStar());
setInterval(() => { if (stars.length < 60) stars.push(createStar()); }, 300);

// ── App logic ─────────────────────────────────────────────────────
let ws;
let pairs = [];
let prices = {};
let activePairId = null;
let chart = null;
let currentTf = '20s';
let alertThresholds = {};
let lastAlertTime = {};
const tfMs = { '20s':20000,'1m':60000,'15m':900000,'30m':1800000,'1h':3600000,'1d':86400000 };
const localHistory = {};

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);
  ws.onopen = () => { document.getElementById('live-indicator').style.display = 'flex'; };
  ws.onclose = () => { document.getElementById('live-indicator').style.display = 'none'; setTimeout(connectWS, 2000); };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'pairs') { pairs = msg.pairs; renderPairs(); }
    if (msg.type === 'prices') { prices = msg.prices; renderPairs(); }
    if (msg.type === 'price') handlePriceUpdate(msg);
  };
}

function handlePriceUpdate(msg) {
  const { pairId, p1, p2, ts } = msg;
  if (!prices[pairId]) prices[pairId] = {};
  prices[pairId].p1 = { price: p1, ts };
  prices[pairId].p2 = { price: p2, ts };
  if (!localHistory[pairId]) localHistory[pairId] = [];
  localHistory[pairId].push({ ts, p1, p2 });
  if (localHistory[pairId].length > 10000) localHistory[pairId].splice(0, 1000);
  const item = document.querySelector(`.pair-item[data-id="${pairId}"]`);
  if (item) {
    const spread = ((p1 - p2) / p2 * 100);
    const el = item.querySelector('.pair-spread');
    if (el) { el.textContent = `Спред: ${spread>=0?'+':''}${spread.toFixed(4)}%`; el.className = 'pair-spread ' + (spread>=0?'spread-positive':'spread-negative'); }
  }
  if (pairId === activePairId) { updateChartLive(p1, p2, ts); updatePriceDisplay(p1, p2); checkAlert(pairId, p1, p2); }
}

function updatePriceDisplay(p1, p2) {
  const elU = document.getElementById('price-p1');
  const elH = document.getElementById('price-p2');
  const elS = document.getElementById('spread-value');
  const prevU = parseFloat(elU.textContent.replace(/,/g,'')) || 0;
  const prevH = parseFloat(elH.textContent.replace(/,/g,'')) || 0;
  elU.textContent = formatPrice(p1);
  elH.textContent = formatPrice(p2);
  flashPrice(elU, p1>prevU?'up':p1<prevU?'down':null);
  flashPrice(elH, p2>prevH?'up':p2<prevH?'down':null);
  const spread = ((p1 - p2) / p2 * 100);
  elS.textContent = `${spread>=0?'+':''}${spread.toFixed(4)}%`;
  elS.style.color = spread>=0?'var(--positive)':'var(--negative)';
}

function flashPrice(el, dir) {
  if (!dir) return;
  el.classList.remove('flash-up','flash-down');
  void el.offsetWidth;
  el.classList.add(dir==='up'?'flash-up':'flash-down');
  setTimeout(()=>el.classList.remove('flash-up','flash-down'),600);
}

function formatPrice(p) {
  if (!p) return '—';
  if (p>=1000) return p.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  if (p>=1) return p.toFixed(4);
  return p.toFixed(6);
}

function renderPairs() {
  const list = document.getElementById('pairs-list');
  const empty = document.getElementById('empty-msg');
  if (pairs.length === 0) { list.innerHTML = ''; list.appendChild(empty); empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  pairs.forEach(p => {
    let item = list.querySelector(`.pair-item[data-id="${p.id}"]`);
    if (!item) {
      item = document.createElement('div');
      item.className = 'pair-item';
      item.dataset.id = p.id;
      item.innerHTML = `
        <div class="pair-name"><span>${p.name}</span><button class="btn-delete" onclick="deletePair('${p.id}',event)">✕</button></div>
        <div class="pair-labels">
          <span class="label-p1">Bybit: ${p.p1Symbol}</span>
          <span style="color:var(--border)">|</span>
          <span class="label-p2">HL: ${p.p2Symbol}</span>
        </div>
        <div class="pair-spread spread-positive">Ожидание данных...</div>`;
      item.addEventListener('click', (e) => { if (e.target.classList.contains('btn-delete')) return; selectPair(p.id); });
      list.appendChild(item);
    }
    if (p.id === activePairId) item.classList.add('active');
  });
  list.querySelectorAll('.pair-item').forEach(item => { if (!pairs.find(p=>p.id===item.dataset.id)) item.remove(); });
}

function selectPair(id) {
  activePairId = id;
  document.querySelectorAll('.pair-item').forEach(el => el.classList.toggle('active', el.dataset.id===id));
  const pair = pairs.find(p=>p.id===id);
  if (!pair) return;
  document.getElementById('no-pair').style.display = 'none';
  const cv = document.getElementById('chart-view');
  cv.style.display = 'flex';
  document.getElementById('chart-pair-name').textContent = pair.name;
  document.getElementById('alert-threshold').value = alertThresholds[id] || '';
  fetch(`/api/history/${id}`).then(r=>r.json()).then(hist => {
    const combined = [...hist, ...(localHistory[id]||[])];
    const seen = new Set();
    const deduped = combined.filter(h=>{ if(seen.has(h.ts)) return false; seen.add(h.ts); return true; }).sort((a,b)=>a.ts-b.ts);
    localHistory[id] = deduped;
    initChart(deduped);
  });
  if (prices[id]&&prices[id].p1&&prices[id].p2) updatePriceDisplay(prices[id].p1.price, prices[id].p2.price);
}

function initChart(histData) {
  const ctx = document.getElementById('priceChart').getContext('2d');
  if (chart) { chart.destroy(); chart = null; }
  const filtered = filterByTimeframe(histData, currentTf);
  const p1Data = filtered.map(h=>({x:h.ts,y:h.p1}));
  const p2Data = filtered.map(h=>({x:h.ts,y:h.p2}));
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [
        { label:'Bybit', data:p1Data, borderColor:'#e05c8a', backgroundColor:'rgba(224,92,138,0.08)', borderWidth:2.5, pointRadius:0, pointHoverRadius:4, tension:0.3, fill:false },
        { label:'Hyperliquid', data:p2Data, borderColor:'#9b59b6', backgroundColor:'rgba(155,89,182,0.08)', borderWidth:2.5, pointRadius:0, pointHoverRadius:4, tension:0.3, fill:false }
      ]
    },
    options: {
      animation: false,
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: { display:true, labels:{ color:'#c084a0', font:{family:'Quicksand',size:12,weight:'600'}, boxWidth:20, padding:16 } },
        tooltip: {
          backgroundColor:'rgba(255,255,255,0.95)',
          borderColor:'#f4a7c0',
          borderWidth:1,
          titleColor:'#c084a0',
          bodyColor:'#5a2d42',
          titleFont:{family:'Quicksand',size:11,weight:'700'},
          bodyFont:{family:'Space Mono',size:12},
          callbacks: {
            label:(ctx)=>` ${ctx.dataset.label}: ${formatPrice(ctx.raw.y)}`,
            afterBody:(items)=>{ if(items.length>=2){const u=items[0].raw.y,h=items[1].raw.y;const sp=((u-h)/h*100);return['',` Спред: ${sp>=0?'+':''}${sp.toFixed(4)}%`];} return []; }
          }
        }
      },
      scales: {
        x: { type:'time', time:{tooltipFormat:'HH:mm:ss'}, grid:{color:'rgba(244,167,192,0.2)'}, ticks:{color:'#c084a0',font:{family:'Quicksand',size:10,weight:'600'},maxTicksLimit:8} },
        y: { grid:{color:'rgba(244,167,192,0.2)'}, ticks:{color:'#c084a0',font:{family:'Quicksand',size:10,weight:'600'},callback:(v)=>formatPrice(v)} }
      }
    }
  });
}

function updateChartLive(p1, p2, ts) {
  if (!chart) return;
  chart.data.datasets[0].data.push({x:ts,y:p1});
  chart.data.datasets[1].data.push({x:ts,y:p2});
  const cutoff = Date.now() - tfMs[currentTf];
  chart.data.datasets.forEach(ds => { while(ds.data.length>0&&ds.data[0].x<cutoff) ds.data.shift(); if(ds.data.length>2000) ds.data.splice(0,ds.data.length-2000); });
  chart.update('none');
}

function filterByTimeframe(data, tf) { const cutoff=Date.now()-tfMs[tf]; return data.filter(h=>h.ts>=cutoff); }

function setTimeframe(tf, btn) {
  currentTf = tf;
  document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if (activePairId) initChart(localHistory[activePairId]||[]);
}

function checkAlert(pairId, p1, p2) {
  const threshold = alertThresholds[pairId];
  if (!threshold) return;
  const spread = Math.abs((p1-p2)/p2*100);
  if (spread >= threshold) {
    const now = Date.now();
    if (!lastAlertTime[pairId]||now-lastAlertTime[pairId]>10000) {
      lastAlertTime[pairId] = now;
      showAlert(`🌸 Спред ${spread.toFixed(4)}%`);
      playAlertSound();
    }
  }
}

function showAlert(msg) {
  const el = document.getElementById('alert-badge');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(()=>el.style.display='none', 5000);
}

function playAlertSound() {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.setValueAtTime(1100, ctx.currentTime+0.1);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.4);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.4);
  } catch {}
}

function saveAlert() {
  if (!activePairId) return;
  const val = parseFloat(document.getElementById('alert-threshold').value);
  alertThresholds[activePairId] = val||0;
  fetch('/api/alert',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pairId:activePairId,threshold:val})});
}

function openModal() { document.getElementById('modal').classList.add('open'); document.getElementById('f-name').focus(); }
function closeModal() { document.getElementById('modal').classList.remove('open'); ['f-name','f-p1','f-p2'].forEach(id=>document.getElementById(id).value=''); }

function addPair() {
  const name = document.getElementById('f-name').value.trim();
  const p1Symbol = document.getElementById('f-p1').value.trim().toUpperCase();
  const p2Symbol = document.getElementById('f-p2').value.trim().toUpperCase();
  if (!name||!p1Symbol||!p2Symbol) { alert('Заполни все поля'); return; }
  fetch('/api/pairs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,p1Symbol,p2Symbol})}).then(r=>r.json()).then(()=>closeModal());
}

function deletePair(id, e) {
  e.stopPropagation();
  if (!confirm('Удалить пару?')) return;
  fetch(`/api/pairs/${id}`,{method:'DELETE'});
  if (activePairId===id) { activePairId=null; document.getElementById('no-pair').style.display='flex'; document.getElementById('chart-view').style.display='none'; }
}

document.getElementById('modal').addEventListener('click', e=>{ if(e.target===e.currentTarget) closeModal(); });
document.querySelectorAll('.form-input').forEach(inp=>{ inp.addEventListener('keydown',e=>{if(e.key==='Enter') addPair();}); });

function updateStatus() {
  fetch('/api/prices').then(r=>r.json()).then(p=>{
    const now = Date.now();
    let p1Online=false, p2Online=false;
    Object.values(p).forEach(pr=>{ if(pr.p1&&now-pr.p1.ts<10000) p1Online=true; if(pr.p2&&now-pr.p2.ts<10000) p2Online=true; });
    document.getElementById('p1-status').className='status-dot '+(p1Online?'online':'');
    document.getElementById('p2-status').className='status-dot '+(p2Online?'online':'');
  }).catch(()=>{});
}

setInterval(updateStatus, 3000);
connectWS();
</script>
</body>
</html>
